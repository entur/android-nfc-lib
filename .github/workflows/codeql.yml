# Reusable Workflows see: https://github.com/entur/gha-security/blob/main/README-code-scan.md

name: CodeQL Scan

on:
  pull_request:
    branches:
      - "master"
  push:
    branches:
      - "master"
  schedule:
    - cron: "0 2 * * MON" # Run Monday at 2AM UTC

jobs:
  code-scan:
    name: CodeQL Scan
    uses: entur/gha-security/.github/workflows/code-scan.yml@v2
    # no secrets necessary
    permissions: # some of these only apply when running on the main branch
      actions: read
      contents: write
      pull-requests: write
      security-events: write
      issues: write
    with:
      use_setup_java: true
      java_version: "21"
      java_distribution: "liberica"
      job_runner: grp-ubuntu-24.04-16core-x64
